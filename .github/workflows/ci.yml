name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Check Formatting (gofmt)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted properly:"
            echo "$unformatted"
            echo "Please run 'gofmt -w .' locally and commit the changes."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Check Vanilla JavaScript Syntax
        run: |
          for file in pkg/server/static/*.js; do
            if [ -f "$file" ]; then
              node -c "$file"
            fi
          done

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Check React UI Syntax & Types
        run: |
          cd ui
          pnpm install
          pnpm run lint
          pnpm run build

      - name: Build UI and check Sync
        run: |
          cd ui
          pnpm install
          pnpm run build
          cd ..
          rm -rf pkg/server/ui-dist
          cp -r ui/dist pkg/server/ui-dist
          if [ -n "$(git status --porcelain pkg/server/ui-dist)" ]; then
            echo "❌ UI build out of sync! Please run 'make build' locally and commit the ui-dist changes."
            git status --porcelain pkg/server/ui-dist
            exit 1
          fi
        shell: bash

      - name: Run Linter (golangci-lint)
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Create dummy UI dist for Go embed
        run: mkdir -p pkg/server/ui-dist && touch pkg/server/ui-dist/index.html
        shell: bash

      - name: Run Tests
        run: go test -v ./...

  e2e-test:
    name: E2E Docker Integration Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Run E2E Integration Test
        run: ./tests/e2e/run.sh

  e2e-ui-test:
    name: E2E Playwright UI Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Run Playwright E2E Test
        run: make e2e-ui

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: |
            tests/e2e/ui/playwright-report/
            tests/e2e/ui/test-results/
          retention-days: 7
