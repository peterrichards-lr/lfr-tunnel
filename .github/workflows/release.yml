name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Validate Tag Version Matches whats-new.json
        run: |
          if [ ! -f pkg/server/static/whats-new.json ]; then
            echo "❌ Error: pkg/server/static/whats-new.json not found!"
            exit 1
          fi
          JSON_VER=$(jq -r '.version' pkg/server/static/whats-new.json)
          TAG_VER="${{ github.ref_name }}"
          JSON_VER_CLEAN="${JSON_VER#v}"
          TAG_VER_CLEAN="${TAG_VER#v}"
          if [ "$JSON_VER_CLEAN" != "$TAG_VER_CLEAN" ]; then
            echo "❌ Error: Pushed tag ($TAG_VER) does not match version in whats-new.json ($JSON_VER)!"
            exit 1
          fi
          echo "✅ Success: Tag ($TAG_VER) matches whats-new.json version ($JSON_VER)."

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run Tests
        run: go test -v ./...

      - name: Prepare Dist Directory
        run: mkdir -p dist

      - name: Build Server Gateway (lfr-tunneld)
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X lfr-tunnel/pkg/config.Version=${{ github.ref_name }}" -trimpath -o dist/lfr-tunneld-linux-amd64 ./cmd/lfr-tunneld
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w -X lfr-tunnel/pkg/config.Version=${{ github.ref_name }}" -trimpath -o dist/lfr-tunneld-linux-arm64 ./cmd/lfr-tunneld

      - name: Build Client CLI (lfr-tunnel)
        run: |
          # Linux
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X lfr-tunnel/pkg/config.Version=${{ github.ref_name }}" -trimpath -o dist/lfr-tunnel-linux-amd64 ./cmd/lfr-tunnel
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w -X lfr-tunnel/pkg/config.Version=${{ github.ref_name }}" -trimpath -o dist/lfr-tunnel-linux-arm64 ./cmd/lfr-tunnel

          # macOS (Darwin)
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w -X lfr-tunnel/pkg/config.Version=${{ github.ref_name }}" -trimpath -o dist/lfr-tunnel-darwin-amd64 ./cmd/lfr-tunnel
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w -X lfr-tunnel/pkg/config.Version=${{ github.ref_name }}" -trimpath -o dist/lfr-tunnel-darwin-arm64 ./cmd/lfr-tunnel

          # Windows
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -X lfr-tunnel/pkg/config.Version=${{ github.ref_name }}" -trimpath -o dist/lfr-tunnel-windows-amd64.exe ./cmd/lfr-tunnel

      - name: Generate Checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Push Checksums to Checksums Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} cb-temp
          cd cb-temp
          git checkout checksums || git checkout --orphan checksums
          git rm -rf . || true
          cp ../dist/checksums.txt .
          git add checksums.txt
          git commit -m "update checksums for ${{ github.ref_name }}"
          git push -u origin checksums --force

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Tap & Scoop Bucket
        env:
          TAP_BUCKET_PAT: ${{ secrets.TAP_BUCKET_PAT }}
        run: |
          chmod +x scripts/update-tap-bucket.sh
          ./scripts/update-tap-bucket.sh "${{ github.ref_name }}" "${TAP_BUCKET_PAT}" "dist/checksums.txt"

  publish-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Client Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lfr-tunnel:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/lfr-tunnel:latest
