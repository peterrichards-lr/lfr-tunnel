repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: go-fmt
        name: Go Format (gofmt)
        entry: gofmt -w
        language: system
        files: \.go$

      - id: golangci-lint
        name: Go Lint (golangci-lint)
        entry: golangci-lint run --timeout 3m
        language: system
        files: \.go$
        pass_filenames: false

      - id: go-test
        name: Go Test (go test)
        entry: go test -v ./...
        language: system
        files: \.go$
        pass_filenames: false
