<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liferay Tunnel Logs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --bg-solid: #1e293b;
            --primary: #0B5FFF;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
        }

        :root[data-theme="light"] {
            --bg-base: #f8fafc;
            --bg-card: #ffffff;
            --bg-solid: #ffffff;
            --primary: #0B5FFF;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: rgba(0, 0, 0, 0.1);
            --success: #059669;
            --warning: #d97706;
            --danger: #dc2626;
            --info: #2563eb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-base); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        .header-panel { padding: 20px; border-bottom: 1px solid var(--border); background: rgba(15, 23, 42, 0.8); display: flex; flex-direction: column; gap: 15px; }
        :root[data-theme="light"] .header-panel { background: #f8fafc; }
        
        .header-top { display: flex; align-items: center; justify-content: space-between; }
        .header-top h1 { font-size: 20px; font-weight: 700; color: var(--text-main); display: flex; align-items: center; gap: 10px;}
        
        .sys-info { display: flex; gap: 20px; font-size: 13px; color: var(--text-muted); flex-wrap: wrap; }
        .sys-info-item { background: var(--bg-card); padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 4px; }
        .sys-info-label { font-size: 11px; text-transform: uppercase; font-weight: 600; opacity: 0.8; }
        .sys-info-value { font-weight: 500; color: var(--text-main); font-family: monospace; font-size: 13px;}

        .controls-panel { padding: 15px 20px; border-bottom: 1px solid var(--border); background: var(--bg-card); display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        
        .filter-group { display: flex; align-items: center; gap: 8px; }
        .filter-group label { font-size: 13px; font-weight: 500; color: var(--text-muted); }
        .filter-input { background: var(--bg-solid); border: 1px solid var(--border); color: var(--text-main); padding: 6px 12px; border-radius: 4px; font-size: 13px; outline: none; }
        .filter-input:focus { border-color: var(--primary); }
        select.filter-input { cursor: pointer; }
        select option { background: var(--bg-solid); color: var(--text-main); }
        
        .btn { background: var(--primary); color: #fff; border: none; padding: 6px 12px; border-radius: 4px; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background: #004ecc; }
        .btn.outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn.outline:hover { background: rgba(255,255,255,0.05); }
        :root[data-theme="light"] .btn.outline:hover { background: rgba(0,0,0,0.05); }

        .logs-container { flex: 1; overflow-y: auto; padding: 10px 0; background: #000; font-family: 'Consolas', 'Courier New', monospace; font-size: 13px; line-height: 1.5; }
        :root[data-theme="light"] .logs-container { background: #f1f5f9; }

        .log-line { padding: 2px 20px; display: flex; gap: 15px; word-break: break-all; border-bottom: 1px solid rgba(255,255,255,0.03); }
        :root[data-theme="light"] .log-line { border-bottom: 1px solid rgba(0,0,0,0.03); }
        .log-line:hover { background: rgba(255,255,255,0.05); }
        :root[data-theme="light"] .log-line:hover { background: rgba(0,0,0,0.05); }
        
        .log-time { color: #8b949e; flex-shrink: 0; width: 140px; }
        :root[data-theme="light"] .log-time { color: #64748b; }
        .log-level { font-weight: 700; width: 60px; flex-shrink: 0; }
        .log-level.INFO { color: var(--info); }
        .log-level.WARN, .log-level.WARNING { color: var(--warning); }
        .log-level.ERROR { color: var(--danger); }
        .log-msg { color: #e6edf3; flex: 1; }
        :root[data-theme="light"] .log-msg { color: #0f172a; }

        .theme-toggle-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; transition: color 0.2s; }
        .theme-toggle-btn:hover { color: var(--text-main); }
        :root[data-theme="light"] .icon-moon { display: block; }
        :root[data-theme="light"] .icon-sun { display: none; }
        :root[data-theme="dark"] .icon-moon { display: none; }
        :root[data-theme="dark"] .icon-sun { display: block; }

        .hidden { display: none !important; }
    </style>
</head>
<body data-theme="dark">
    <div class="header-panel">
        <div class="header-top">
            <h1>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                Liferay Tunnel Logs
            </h1>
            <button class="theme-toggle-btn" id="theme-toggle" title="Toggle Theme">
                <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
        </div>
        <div class="sys-info">
            <div class="sys-info-item">
                <span class="sys-info-label">Client Version</span>
                <span class="sys-info-value" id="info-client-version">-</span>
            </div>
            <div class="sys-info-item">
                <span class="sys-info-label">Server Version</span>
                <span class="sys-info-value" id="info-server-version">-</span>
            </div>
            <div class="sys-info-item">
                <span class="sys-info-label">Gateway URL</span>
                <span class="sys-info-value" id="info-gateway-url">-</span>
            </div>
            <div class="sys-info-item">
                <span class="sys-info-label">Subdomain</span>
                <span class="sys-info-value" id="info-subdomain">-</span>
            </div>
            <div class="sys-info-item">
                <span class="sys-info-label">Log File</span>
                <span class="sys-info-value" id="info-log-file">-</span>
            </div>
        </div>
    </div>

    <div class="controls-panel">
        <div class="filter-group">
            <label for="filter-search">Search:</label>
            <input type="text" id="filter-search" class="filter-input" placeholder="Type to filter..." style="width: 250px;">
        </div>
        <div class="filter-group">
            <label for="filter-level">Level:</label>
            <select id="filter-level" class="filter-input">
                <option value="ALL">All Levels</option>
                <option value="INFO">INFO</option>
                <option value="WARNING">WARNING</option>
                <option value="ERROR">ERROR</option>
            </select>
        </div>
        <div class="filter-group" style="margin-left: auto;">
            <label style="display:flex; align-items:center; gap: 6px; cursor: pointer; color: var(--text-main);">
                <input type="checkbox" id="auto-scroll" checked> Auto-Scroll
            </label>
        </div>
        <button class="btn outline" id="btn-refresh">Refresh Logs</button>
        <button class="btn outline" id="btn-clear">Clear View</button>
    </div>

    <div class="logs-container" id="logs-container">
        <!-- Log lines will be injected here -->
    </div>

    <script>
        let allLogs = [];
        let autoScroll = true;
        let lastLogLineCount = 0;
        
        const logsContainer = document.getElementById('logs-container');
        const filterSearch = document.getElementById('filter-search');
        const filterLevel = document.getElementById('filter-level');
        const autoScrollCheckbox = document.getElementById('auto-scroll');

        // Theme Handling
        const themeBtn = document.getElementById('theme-toggle');
        const root = document.documentElement;
        
        let currentTheme = localStorage.getItem('lfr-theme') || 'dark';
        root.setAttribute('data-theme', currentTheme);

        themeBtn.addEventListener('click', () => {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            root.setAttribute('data-theme', currentTheme);
            localStorage.setItem('lfr-theme', currentTheme);
        });

        autoScrollCheckbox.addEventListener('change', (e) => {
            autoScroll = e.target.checked;
        });

        logsContainer.addEventListener('scroll', () => {
            const isAtBottom = logsContainer.scrollHeight - logsContainer.scrollTop <= logsContainer.clientHeight + 10;
            if (!isAtBottom && autoScroll) {
                autoScrollCheckbox.checked = false;
                autoScroll = false;
            }
        });

        function renderLogs() {
            const search = filterSearch.value.toLowerCase();
            const level = filterLevel.value;

            logsContainer.innerHTML = '';
            
            let html = '';
            for (const log of allLogs) {
                if (level !== 'ALL' && log.level !== level) continue;
                if (search && !log.raw.toLowerCase().includes(search)) continue;

                html += `<div class="log-line">
                    <div class="log-time">${log.time}</div>
                    <div class="log-level ${log.level}">${log.level}</div>
                    <div class="log-msg">${log.msg}</div>
                </div>`;
            }
            logsContainer.innerHTML = html;

            if (autoScroll) {
                logsContainer.scrollTop = logsContainer.scrollHeight;
            }
        }

        function parseLogLine(line) {
            // Expected format: "2026/07/16 11:51:09 INFO [Client] ..."
            // Or panic / generic log line
            const regex = /^(\d{4}\/\d{2}\/\d{2} \d{2}:\d{2}:\d{2})\s+([A-Z]+)\s+(.*)/;
            const match = line.match(regex);
            
            if (match) {
                return {
                    raw: line,
                    time: match[1],
                    level: match[2],
                    msg: match[3]
                };
            }
            // Fallback for lines without standard prefix
            return {
                raw: line,
                time: '',
                level: 'INFO',
                msg: line
            };
        }

        async function fetchInfo() {
            try {
                const res = await fetch('/api/info');
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('info-client-version').textContent = data.client_version || '-';
                    document.getElementById('info-server-version').textContent = data.server_version || '-';
                    document.getElementById('info-gateway-url').textContent = data.server_url || '-';
                    document.getElementById('info-subdomain').textContent = data.client_subdomain || '-';
                    document.getElementById('info-log-file').textContent = data.log_file || '-';
                }
            } catch(e) {
                console.error("Failed to fetch info", e);
            }
        }

        async function fetchLogs() {
            try {
                const res = await fetch('/api/logs');
                if (res.ok) {
                    const text = await res.text();
                    const lines = text.split('\n');
                    if (lines.length > 0 && lines[lines.length - 1] === '') {
                        lines.pop(); // Remove trailing empty line
                    }
                    
                    if (lines.length !== lastLogLineCount) {
                        allLogs = lines.map(parseLogLine);
                        lastLogLineCount = lines.length;
                        renderLogs();
                    }
                }
            } catch(e) {
                console.error("Failed to fetch logs", e);
            }
        }

        filterSearch.addEventListener('input', renderLogs);
        filterLevel.addEventListener('change', renderLogs);
        
        document.getElementById('btn-refresh').addEventListener('click', fetchLogs);
        document.getElementById('btn-clear').addEventListener('click', () => {
            allLogs = [];
            lastLogLineCount = 0;
            renderLogs();
        });

        // Initialization
        fetchInfo();
        fetchLogs();
        
        // Auto-refresh logs every 2 seconds
        setInterval(fetchLogs, 2000);

    </script>
</body>
</html>
