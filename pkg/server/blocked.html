<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Blocked by Security WAF | Liferay Tunnel</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #2e0808 50%, #450a0a 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(239, 68, 68, 0.2);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --alert-red: #ef4444;
            --alert-red-glow: rgba(239, 68, 68, 0.4);
            --info-blue: #38bdf8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow-x: hidden;
        }

        .container {
            max-width: 520px;
            width: 100%;
            text-align: center;
            position: relative;
        }

        /* Ambient background glow */
        .ambient-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--alert-red-glow);
            filter: blur(100px);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .logo-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: rgba(239, 68, 68, 0.05);
            border: 1px solid rgba(239, 68, 68, 0.15);
            margin-bottom: 28px;
            position: relative;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            fill: none;
            stroke: var(--alert-red);
        }

        .pulse-dot {
            position: absolute;
            bottom: -4px;
            right: -4px;
            width: 16px;
            height: 16px;
            background-color: var(--alert-red);
            border-radius: 50%;
            border: 3px solid #1e293b;
            box-shadow: 0 0 12px var(--alert-red-glow);
            animation: pulse 2s infinite;
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
            background: linear-gradient(to right, #ffffff, #fca5a5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.description {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 32px;
            font-weight: 300;
        }

        .details-table {
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 16px;
            padding: 18px 22px;
            margin-bottom: 36px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            font-size: 13.5px;
        }

        .detail-row:not(:last-child) {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .detail-label {
            color: var(--text-secondary);
            font-weight: 400;
        }

        .detail-value {
            font-family: monospace;
            color: #fca5a5;
            font-weight: 600;
            text-align: right;
            max-width: 60%;
            word-break: break-all;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            font-weight: 600;
            font-size: 15px;
            padding: 14px 32px;
            border-radius: 12px;
            border: 1px solid rgba(239, 68, 68, 0.4);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            background: rgba(239, 68, 68, 0.35);
            color: #fff;
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.25);
        }

        .btn:active {
            transform: translateY(0);
        }

        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: rgba(148, 163, 184, 0.5);
            letter-spacing: 0.5px;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 8px rgba(239, 68, 68, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ambient-glow"></div>
        <div class="card">
            <div class="logo-container">
                <img src="/static/logo.svg" alt="Liferay Tunnel" class="logo-icon" width="44" height="44">
                <div class="pulse-dot"></div>
            </div>
            <h1>Request Blocked</h1>
            <p class="description">
                Your request was blocked by the Web Application Firewall (WAF) because it matched an exploit signature.
            </p>
            
            <div class="details-table">
                <div class="detail-row">
                    <span class="detail-label">Requested Host</span>
                    <span class="detail-value">{{.Host}}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Blocked Category</span>
                    <span class="detail-value">{{.Category}}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Rule Trigger</span>
                    <span class="detail-value">{{.Reason}}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Visitor IP</span>
                    <span class="detail-value">{{.IP}}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Transaction ID</span>
                    <span class="detail-value" style="color: var(--text-secondary);">{{.TxID}}</span>
                </div>
            </div>

            <button class="btn" onclick="window.history.back()">
                Go Back
            </button>
        </div>
        <div class="footer" style="margin-top: 24px; font-size: 11px; opacity: 0.6; display: flex; justify-content: center; gap: 12px; align-items: center; width: 100%;">
            <a href="/privacy" style="color: var(--text-secondary); text-decoration: none; transition: 0.2s;" onmouseover="this.style.color='rgba(239, 68, 68, 0.8)'" onmouseout="this.style.color='var(--text-secondary)'">Privacy Policy</a>
            <span style="opacity: 0.5;">•</span>
            <a href="/cookies" style="color: var(--text-secondary); text-decoration: none; transition: 0.2s;" onmouseover="this.style.color='rgba(239, 68, 68, 0.8)'" onmouseout="this.style.color='var(--text-secondary)'">Cookie Disclosure</a>
        </div>
    </div>
</body>
</html>
