# Gateway Maintenance Tab
maint_tab_title=Gateway Maintenance
maint_soft_title=🛠️ Gateway Soft Maintenance Mode
maint_soft_desc=Activating Soft Maintenance Mode blocks standard user logins, rejects new tunnel connections, and kicks active standard tunnels. Visitors trying to access developer subdomains will receive a scheduled maintenance page. <strong>Administrators and Owners will remain fully unblocked so they can manage the portal and disable this mode from the dashboard.</strong>
maint_lbl_action=Action Name
maint_lbl_duration=Duration (Minutes)
