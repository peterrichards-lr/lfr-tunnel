privacy_title=Privacy Policy
privacy_desc=This Privacy Policy describes how this self-hosted Liferay Tunnel (lfr-tunneld) gateway processes your data.
privacy_sec1_title=1. Information We Collect & Process
privacy_sec1_bullet1=IP Addresses: Processed strictly to route packets and enforce auto-ban security protections.
privacy_sec1_bullet2=Email Addresses: Processed for account verification, approval notifications, and passwordless magic link logins.
privacy_sec1_bullet3=Audit Logs: Records administrative actions, token creations, and security violations locally in the gateway database.
privacy_sec2_title=2. Data Security & Storage
privacy_sec2_desc=Personal Access Tokens (PATs) are stored on the server using secure SHA-256 cryptographic hashes. All data is stored in a local, private SQLite database and is never shared, sold, or transmitted to external servers.
