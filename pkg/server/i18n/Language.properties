maint_opt_10=Schedule in 10 Minutes ⏳
maint_opt_30=Schedule in 30 Minutes ⏳
maint_btn_enable_soft=Enable Soft Maintenance
maint_btn_disable_soft=Disable Soft Maintenance
maint_iron_title=🔒 Nginx Iron Curtain Mode (Hard Maintenance - Owner Only)
maint_iron_desc=Activating Nginx Iron Curtain Mode blocks all external incoming requests. <strong style="color: #ef4444;">Warning: You will be disconnected. It must be disabled via SSH.</strong>
maint_btn_enable_hard=Enable Iron Curtain
maint_btn_disable_hard=Disable Iron Curtain
