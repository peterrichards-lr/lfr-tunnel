privacy_title=سياسة الخصوصية
privacy_desc=تصف سياسة الخصوصية هذه كيفية قيام بوابة Liferay Tunnel (lfr-tunneld) ذاتية الاستضافة بمعالجة بياناتك.
privacy_sec1_title=1. المعلومات التي نجمعها ونعالجها
privacy_sec1_bullet1=عنوان البروتوكول (IP): تتم معالجته فقط لتوجيه الحزم وفرض حماية أمان الحظر التلقائي.
privacy_sec1_bullet2=البريد الإلكتروني: تتم معالجته للتحقق من الحساب، وإشعارات الموافقة، وتسجيل الدخول عبر الرابط السحري.
privacy_sec1_bullet3=سجلات التدقيق: تسجل الإجراءات الإدارية، وإنشاء الرموز المميزة، والانتهاكات الأمنية محلياً في قاعدة البيانات.
privacy_sec2_title=2. أمن البيانات وتخزينها
privacy_sec2_desc=يتم تخزين رموز الوصول الشخصية (PAT) على الخادم باستخدام تشفير SHA-256 الآمن. يتم تخزين جميع البيانات في قاعدة بيانات SQLite محلية وخاصة ولا يتم مشاركتها أو بيعها أو نقلها أبداً إلى خوادم خارجية.
return_to_portal=← العودة إلى البوابة

cookie_title=إخلاء مسؤولية ملفات تعريف الارتباط (Cookies)
cookie_desc=يستخدم هذا الموقع ملف تعريف ارتباط واحد فقط للحفاظ على جلستك نشطة.
cookie_sec1_title=ملفات تعريف الارتباط الضرورية للغاية
cookie_sec1_bullet1=اسم الملف: lfr_session
cookie_sec1_bullet2=النوع: First-party, HTTP-Only, Secure, SameSite=Lax
cookie_sec1_bullet3=الغرض: ملف تعريف الارتباط هذا ضروري تماماً لإبقائك مسجلاً للدخول بأمان في جلسة البوابة الخاصة بك. لا يحتوي على أي بيانات تتبع أو معلمات شخصية.
cookie_sec1_bullet4=الموافقة: بموجب القانون العام لحماية البيانات (GDPR) وتوجيه ePrivacy، تُعفى ملفات تعريف الارتباط الضرورية للجلسة من متطلبات لافتات الموافقة.

