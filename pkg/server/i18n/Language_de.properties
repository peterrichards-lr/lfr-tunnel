# Onboarding Tour
onboarding_guide_title=👋 Onboarding-Tour
tour_welcome_title=Willkommen bei Liferay Tunnel!
tour_welcome_desc=Lassen Sie uns eine kurze 1-minütige interaktive Tour durch Ihr Entwickler-Dashboard machen, um Ihnen zu zeigen, wie Sie Ihre Subdomains und Tunnel verwalten.
tour_sidebar_title=Navigations-Sidebar
tour_sidebar_desc=Verwenden Sie die Sidebar, um zwischen den Tabs Übersicht, API-Tokens, Subdomain-Reservierungen, Aktive Tunnel und Analysen zu wechseln.
tour_reservations_title=Subdomain-Reservierungen
tour_reservations_desc=Hier können Sie Wildcard-Subdomains auf unseren öffentlichen Domains (z. B. lfr-demo.se) reservieren, Ablaufdaten einsehen und Verlängerungen anfordern.
tour_tokens_title=Persönliche Zugriffstoken
tour_tokens_desc=Generieren Sie hier sichere CLI-Token. Sie müssen Ihren lokalen CLI-Client mit einem dieser Token konfigurieren, um eine Verbindung herzustellen.
tour_tunnels_title=Aktive Tunnel
tour_tunnels_desc=Überwachen Sie Ihre aktuell verbundenen Client-Tunnel in Echtzeit. Zeigen Sie Live-Verkehrsmetriken und Latenzen an und trennen Sie inaktive Verbindungen bei Bedarf.
tour_analytics_title=Verkehrsanalysen
tour_analytics_desc=Überwachen Sie Ihre gesamte Bandbreitennutzung (hochgeladene/heruntergeladene Bytes) im Zeitverlauf in einem übersichtlichen Diagramm.
tour_settings_title=Kontoeinstellungen
tour_settings_desc=Aktualisieren Sie Ihren bevorzugten Namen, die Sprache, das Theme und konfigurieren Sie die Multi-Faktor-Authentifizierung (MFA) für zusätzliche Sicherheit.
tour_end_title=Onboarding abgeschlossen!
tour_end_desc=Sie sind startklar. Viel Spaß bei der Nutzung von Liferay Tunnel!

