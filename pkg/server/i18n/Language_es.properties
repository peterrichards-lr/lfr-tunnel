cookie_sec1_title=Cookies Estrictamente Necesarias
cookie_sec1_bullet1=Nombre de Cookie: lfr_session
cookie_sec1_bullet2=Tipo: Propias, HTTP-Only, Seguras, SameSite=Lax
cookie_sec1_bullet3=Propósito: Esta cookie es strictly necesaria para mantenerlo conectado de manera segura en su sesión de portal. No contiene datos de seguimiento ni identificadores personales.
cookie_sec1_bullet4=Consentimiento: Bajo el RGPD y la Directiva ePrivacy, las cookies de sesión estrictamente necesarias están exentas del requisito de mostrar carteles de consentimiento.

