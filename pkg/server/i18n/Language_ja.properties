privacy_title=プライバシーポリシー
privacy_desc=本プライバシーポリシーは、セルフホストされた Liferay Tunnel (lfr-tunneld) ゲートウェイがお客様のデータを処理する方法を説明するものです。
privacy_sec1_title=1. 収集および処理する情報
privacy_sec1_bullet1=IPアドレス：パケットのルーティング、および自動アクセス禁止セキュリティの適用のためにのみ厳格に処理されます。
privacy_sec1_bullet2=メールアドレス：アカウント認証、承認通知、パスワードなしのマジックログインリンクのために処理されます。
privacy_sec1_bullet3=監査ログ：操作、トークン生成、セキュリティ侵害をゲートウェイのデータベースにローカルに記録します。
privacy_sec2_title=2. データのセキュリティと保存
privacy_sec2_desc=個人アクセストークン (PAT) は、安全な SHA-256 暗号化ハッシュを使用してサーバーに保存されます。すべてのデータはローカルのプライベートな SQLite データベースに保存され、外部サーバーに共有、保存、送信されることはありません。
return_to_portal=← ポータルに戻る

cookie_title=クッキーの開示
cookie_desc=本ウェブアプリケーションは、お客様のセッションを維持するために正確に1つのクッキーを使用します。
cookie_sec1_title=必須のクッキー
cookie_sec1_bullet1=クッキー名：lfr_session
cookie_sec1_bullet2=タイプ：ファーストパーティ（First-party）、HTTP-Only、Secure、SameSite=Lax
cookie_sec1_bullet3=目的：このクッキーは、ポータルセッションへの安全なログイン状態を維持するために不可欠です。追跡データや個人識別情報は含まれていません。
cookie_sec1_bullet4=同意：GDPRおよびePrivacy指令に基づき、不可欠なセッションクッキーは同意バナー表示義務から除外されます。

