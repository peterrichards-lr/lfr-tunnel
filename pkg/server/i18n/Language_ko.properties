privacy_title=개인정보 처리방침
privacy_desc=본 개인정보 처리방침은 이 자체 호스팅 Liferay Tunnel (lfr-tunneld) 게이트웨이가 귀하의 데이터를 처리하는 방법을 설명합니다.
privacy_sec1_title=1. 수집 및 처리하는 정보
privacy_sec1_bullet1=IP 주소: 엄격히 패킷 라우팅 및 자동 차단 보안 보호 기능 적용을 위해서만 처리됩니다.
privacy_sec1_bullet2=이메일 주소: 계정 확인, 승인 알림 및 비밀번호 없는 매직 링크 로그인을 위해 처리됩니다.
privacy_sec1_bullet3=감사 로그: 감사 로그는 게이트웨이 데이터베이스에 로컬로 기록합니다.
privacy_sec2_title=2. 데이터 보안 및 보관
privacy_sec2_desc=개인 액세스 토큰(PAT)은 안전한 SHA-256 암호화 해시를 사용하여 서버에 저장됩니다. 모든 데이터는 로컬의 프라이빗 SQLite 데이터베이스에 보관되며 외부 서버와 공유, 판매 또는 전송되지 않습니다.
return_to_portal=← 포털로 돌아가기

cookie_title=쿠키 고지
cookie_desc=본 웹 애플리케이션은 귀하의 세션을 유지하기 위해 정확히 하나의 쿠키를 사용합니다.
cookie_sec1_title=필수 쿠키
cookie_sec1_bullet1=쿠키 이름: lfr_session
cookie_sec1_bullet2=유형: 퍼스트 파티(First-party), HTTP-Only, Secure, SameSite=Lax
cookie_sec1_bullet3=목적: 본 쿠키는 귀하의 포털 세션 로그인 상태를 안전하게 유지하기 위해 절대적으로 필요합니다. 추적 데이터나 개인 식별 정보는 포함되어 있지 않습니다.
cookie_sec1_bullet4=동의: GDPR 및 ePrivacy 지침에 따라, 절대적으로 필요한 세션 쿠키는 쿠키 동의 배너 표시 의무에서 제외됩니다.

