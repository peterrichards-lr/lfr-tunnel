cookie_title=Cookie 披露
cookie_desc=本 Web 应用程序恰好使用一个 Cookie 来维护您的会话。
cookie_sec1_title=绝对必要的 Cookie
cookie_sec1_bullet1=Cookie 名称：lfr_session
cookie_sec1_bullet2=类型：第一方 (First-party), HTTP-Only, Secure, SameSite=Lax
cookie_sec1_bullet3=目的：此 Cookie 对于安全保持您的门户会话登录状态是绝对必需的。它不包含任何跟踪数据或个人身份信息。
cookie_sec1_bullet4=同意：根据 GDPR 和 ePrivacy 指令，绝对必要的 Cookie 免于显示同意横幅提示。

