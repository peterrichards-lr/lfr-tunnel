privacy_title=隐私政策
privacy_desc=本隐私政策说明了该自托管 Liferay Tunnel (lfr-tunneld) 网关如何处理您的数据。
privacy_sec1_title=1. 我们收集与处理的信息
privacy_sec1_bullet1=IP地址：仅用于路由数据包和实施自动拦截安全保护。
privacy_sec1_bullet2=电子邮件地址：用于账户验证、审批通知以及无密码魔法链接登录。
privacy_sec1_bullet3=审计日志：在本地网关数据库中记录管理员操作、令牌创建以及安全违规事件。
privacy_sec2_title=2. 数据安全与存储
privacy_sec2_desc=个人访问令牌 (PAT) 使用安全的 SHA-256 加密哈希值存储在服务器上。所有数据都存储在本地、私有的 SQLite 数据库中，绝不会与外部服务器共享、出售或传输。
return_to_portal=← 返回门户

cookie_title=Cookie 披露
cookie_desc=本 Web 应用程序恰好使用一个 Cookie 来维护您的会话。
cookie_sec1_title=绝对必要的 Cookie
cookie_sec1_bullet1=Cookie 名称：lfr_session
cookie_sec1_bullet2=类型：第一方 (First-party), HTTP-Only, Secure, SameSite=Lax
cookie_sec1_bullet3=目的：此 Cookie 对于安全保持您的门户会话登录状态是绝对必需的。它不包含任何跟踪数据或个人身份信息。
cookie_sec1_bullet4=同意：根据 GDPR 和 ePrivacy 指令，绝对必要的 Cookie 免于显示同意横幅提示。

