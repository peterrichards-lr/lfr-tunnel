<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Environment Offline | Liferay Tunnel</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/offline.css">
</head>
<body>
    <div class="container">
        <div class="ambient-glow"></div>
        <div class="card">
            <div class="logo-container">
                <!-- Liferay logo-like shape SVG -->
                <svg class="logo-icon" viewBox="0 0 24 24">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <div class="pulse-dot"></div>
            </div>
            <h1>Environment Offline</h1>
            <p class="description">
                The Sales Engineering tunnel client is not connected, or the local Liferay instance is currently powered off.
            </p>
            
            <div class="details-table">
                <div class="detail-row">
                    <span class="detail-label">Requested Host</span>
                    <span class="detail-value" id="host-placeholder">loading...</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Gateway Status</span>
                    <span class="detail-value" style="color: var(--alert-red);">502 Bad Gateway</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Service</span>
                    <span class="detail-value">Liferay Development Manager</span>
                </div>
            </div>

            <button class="btn" onclick="window.location.reload()">
                Check Connection
            </button>
        </div>
        <div class="footer">
            POWERED BY LFR-TUNNEL &bull; OPEN SOURCE MIT
        </div>
    </div>

    <script src="/static/offline.js"></script>
</body>
</html>
