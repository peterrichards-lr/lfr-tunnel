<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Maintenance | Liferay Tunnel</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --liferay-blue: #0b63e6;
            --liferay-blue-glow: rgba(11, 99, 230, 0.4);
            --warning-amber: #f59e0b;
            --warning-amber-glow: rgba(245, 158, 11, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow-x: hidden;
        }

        .container {
            max-width: 520px;
            width: 100%;
            text-align: center;
            position: relative;
        }

        /* Ambient background glow */
        .ambient-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--warning-amber-glow);
            filter: blur(100px);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .logo-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 28px;
            position: relative;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            fill: #fff;
        }

        .pulse-dot {
            position: absolute;
            bottom: -4px;
            right: -4px;
            width: 16px;
            height: 16px;
            background-color: var(--warning-amber);
            border-radius: 50%;
            border: 3px solid #1e293b;
            box-shadow: 0 0 12px var(--warning-amber-glow);
            animation: pulse 2s infinite;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.description {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 32px;
            font-weight: 300;
        }

        .details-table {
            width: 100%;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 36px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 14px;
        }

        .detail-row:not(:last-child) {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .detail-label {
            color: var(--text-secondary);
            font-weight: 400;
        }

        .detail-value {
            font-family: monospace;
            color: #38bdf8;
            font-weight: 600;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--warning-amber);
            color: #1e1b4b;
            font-weight: 700;
            font-size: 15px;
            padding: 14px 32px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 14px var(--warning-amber-glow);
        }

        .btn:hover {
            transform: translateY(-2px);
            background: #fbbf24;
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: rgba(148, 163, 184, 0.5);
            letter-spacing: 0.5px;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 8px rgba(245, 158, 11, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(245, 158, 11, 0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

        function detectLanguage() {
            const userLang = (navigator.language || navigator.userLanguage || "en").toLowerCase();
            const prefix = userLang.split("-")[0];
            return translations[prefix] ? prefix : "en";
        }

        function initI18n() {
            const lang = detectLanguage();

            // Translate static elements
            document.querySelectorAll("[data-i18n]").forEach(el => {
                const key = el.getAttribute("data-i18n");
                if (translations[lang] && translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });

            // Set dynamic Description text with translation mapping
            const descEl = document.getElementById("maint-desc");
            if (descEl) {
                const reasonText = (translations[lang].reasons && translations[lang].reasons[rawReason]) 
                    ? translations[lang].reasons[rawReason] 
                    : rawReason;
                descEl.textContent = translations[lang].descTemplate.replace("{reason}", reasonText);
            }

            // Set dynamic Action text with translation mapping
            const actionEl = document.getElementById("action-val");
            if (actionEl) {
                const actionText = (translations[lang].actions && translations[lang].actions[rawAction]) 
                    ? translations[lang].actions[rawAction] 
                    : rawAction;
                actionEl.textContent = actionText;
            }

            // Set dynamic Duration Countdown
            const durationEl = document.getElementById("duration-val");
            const statusEl = document.getElementById("status-val");
            
            if (durationEl) {
                if (maintenanceEndTime > 0) {
                    function updateCountdown() {
                        const now = Math.floor(Date.now() / 1000);
                        const timeLeft = maintenanceEndTime - now;
                        
                        if (timeLeft <= 0) {
                            durationEl.textContent = translations[lang].overtimeMsg;
                            if (statusEl) {
                                statusEl.textContent = translations[lang].overtimeMsg;
                            }
                            clearInterval(timerInterval);
                        } else {
                            const minutes = Math.floor(timeLeft / 60);
                            const seconds = timeLeft % 60;
                            const minStr = String(minutes).padStart(2, '0');
                            const secStr = String(seconds).padStart(2, '0');
                            durationEl.textContent = `${minStr}:${secStr} ${translations[lang].remaining}`;
                        }
                    }
                    updateCountdown();
                    const timerInterval = setInterval(updateCountdown, 1000);
                } else {
                    // Fallback to static text representation
                    durationEl.textContent = rawDuration;
                }
            }
        }

        // Initialize i18n on load
        window.addEventListener("DOMContentLoaded", initI18n);
