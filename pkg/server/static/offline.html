<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Environment Offline | Liferay Tunnel</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --liferay-blue: #0b63e6;
            --liferay-blue-glow: rgba(11, 99, 230, 0.4);
            --alert-red: #ef4444;
            --alert-red-glow: rgba(239, 68, 68, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow-x: hidden;
        }

        .container {
            max-width: 520px;
            width: 100%;
            text-align: center;
            position: relative;
        }

        /* Ambient background glow */
        .ambient-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--liferay-blue-glow);
            filter: blur(100px);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .logo-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 28px;
            position: relative;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            fill: #fff;
        }

        .pulse-dot {
            position: absolute;
            bottom: -4px;
            right: -4px;
            width: 16px;
            height: 16px;
            background-color: var(--alert-red);
            border-radius: 50%;
            border: 3px solid #1e293b;
            box-shadow: 0 0 12px var(--alert-red-glow);
            animation: pulse 2s infinite;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.description {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 32px;
            font-weight: 300;
        }

        .details-table {
            width: 100%;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 36px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 14px;
        }

        .detail-row:not(:last-child) {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .detail-label {
            color: var(--text-secondary);
            font-weight: 400;
        }

        .detail-value {
            font-family: monospace;
            color: #38bdf8;
            font-weight: 600;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--liferay-blue);
            color: #fff;
            font-weight: 600;
            font-size: 15px;
            padding: 14px 32px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 14px var(--liferay-blue-glow);
        }

        .btn:hover {
            transform: translateY(-2px);
            background: #2575fc;
            box-shadow: 0 6px 20px rgba(37, 117, 252, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: rgba(148, 163, 184, 0.5);
            letter-spacing: 0.5px;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 8px rgba(239, 68, 68, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ambient-glow"></div>
        <div class="card">
            <div class="logo-container">
                <img src="/static/logo.svg" alt="Liferay Tunnel" class="logo-icon" width="44" height="44">
                <div class="pulse-dot"></div>
            </div>
            <h1 data-i18n="title">Environment Offline</h1>
            <p class="description" data-i18n="desc">
                The Sales Engineering tunnel client is not connected, or the local Liferay instance is currently powered off.
            </p>
            
            <div class="details-table">
                <div class="detail-row">
                    <span class="detail-label" data-i18n="hostLabel">Requested Host</span>
                    <span class="detail-value" id="host-placeholder">loading...</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label" data-i18n="statusLabel">Gateway Status</span>
                    <span class="detail-value" style="color: var(--alert-red);" data-i18n="statusVal">502 Bad Gateway</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label" data-i18n="serviceLabel">Service</span>
                    <span class="detail-value" data-i18n="serviceVal">Liferay Development Manager</span>
                </div>
            </div>

            <button class="btn" onclick="window.location.reload()">
                Check Connection
            </button>
        </div>
        <div class="footer" style="margin-top: 24px; font-size: 11px; opacity: 0.6; display: flex; justify-content: center; gap: 12px; align-items: center; width: 100%;">
            <a href="https://status.lfr-demo.se" target="_blank" rel="noopener noreferrer" style="color: var(--text-secondary); text-decoration: none; transition: 0.2s;" onmouseover="this.style.color='var(--liferay-blue)'" onmouseout="this.style.color='var(--text-secondary)'" data-i18n="systemStatus">System Status</a>
            <span style="opacity: 0.5;">•</span>
            <a href="/privacy" style="color: var(--text-secondary); text-decoration: none; transition: 0.2s;" onmouseover="this.style.color='var(--liferay-blue)'" onmouseout="this.style.color='var(--text-secondary)'" data-i18n="privacy">Privacy Policy</a>
            <span style="opacity: 0.5;">•</span>
            <a href="/cookies" style="color: var(--text-secondary); text-decoration: none; transition: 0.2s;" onmouseover="this.style.color='var(--liferay-blue)'" onmouseout="this.style.color='var(--text-secondary)'" data-i18n="cookies">Cookie Disclosure</a>
        </div>
    </div>

    <script>
        // Dynamically show the current domain host
        document.getElementById('host-placeholder').textContent = window.location.hostname;
    </script>

        function detectLanguage() {
            const userLang = (navigator.language || navigator.userLanguage || "en").toLowerCase();
            const prefix = userLang.split("-")[0];
            return translations[prefix] ? prefix : "en";
        }

        function initI18n() {
            const lang = detectLanguage();
            if (lang === 'ar') {
                document.body.style.direction = "rtl";
            }
            document.querySelectorAll("[data-i18n]").forEach(el => {
                const key = el.getAttribute("data-i18n");
                if (translations[lang] && translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });
        }
        
        // Inject into document load or run immediately since script is at the bottom
        initI18n();
    </script>

</body>
</html>
