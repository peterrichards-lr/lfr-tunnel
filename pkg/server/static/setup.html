<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Setup - Liferay Tunnel</title>
    <link rel="stylesheet" href="/static/index.css">
    <style>
        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            width: 100%;
            max-width: 400px;
            padding: 32px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass card">
            <h2 style="text-align: center; margin-bottom: 24px;">Complete Your Profile</h2>
            <form id="setup-form">
                <input type="text" id="setup-first-name" class="input-field" placeholder="First Name" required>
                <input type="text" id="setup-last-name" class="input-field" placeholder="Last Name" required>
                <input type="text" id="setup-preferred-name" class="input-field" placeholder="Preferred Name (optional)">
                
                <div id="consent-container" class="hidden" style="display: none; margin-top: 16px; gap: 8px; align-items: flex-start; text-align: left;">
                    <input type="checkbox" id="setup-consent" style="margin-top: 3px; cursor: pointer;">
                    <label for="setup-consent" style="font-size: 12px; color: var(--text-muted); line-height: 1.4; cursor: pointer; user-select: none;">
                        I acknowledge that I have read the <a href="/privacy" target="_blank" id="footer-privacy-link" style="color: var(--primary); text-decoration: none;">Privacy Policy</a> and <a href="/cookies" target="_blank" id="footer-cookie-link" style="color: var(--primary); text-decoration: none;">Cookie Disclosure</a> and agree to their terms.
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary" style="margin-top: 16px; width: 100%;">Complete Setup</button>
                <div id="setup-msg" style="margin-top: 12px; font-size: 13px; text-align: center;"></div>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('setup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.querySelector('#setup-form button');
            const msg = document.getElementById('setup-msg');
            btn.disabled = true;
            msg.textContent = "Processing...";
            msg.style.color = "var(--text)";

            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            const payload = {
                token: token,
                first_name: document.getElementById('setup-first-name').value,
                last_name: document.getElementById('setup-last-name').value,
                preferred_name: document.getElementById('setup-preferred-name').value,
                policy_consent: document.getElementById('setup-consent').checked
            };

            try {
                const res = await fetch('/api/complete-setup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                    msg.textContent = "Profile setup complete! Please wait for an administrator to approve your account.";
                    msg.style.color = "var(--success)";
                } else {
                    const data = await res.json();
                    msg.textContent = data.error || "Setup failed. Token may be expired.";
                    msg.style.color = "var(--danger)";
                    btn.disabled = false;
                }
            } catch (err) {
                msg.textContent = "A network error occurred.";
                msg.style.color = "var(--danger)";
                btn.disabled = false;
            }
        });

        // Load custom privacy/cookie links if configured
        fetch('/api/version')
            .then(res => res.json())
            .then(vData => {
                if (vData.enforce_policy_consent === "true") {
                    const cc = document.getElementById('consent-container');
                    if (cc) {
                        cc.style.display = 'flex';
                        cc.classList.remove('hidden');
                    }
                    const cb = document.getElementById('setup-consent');
                    if (cb) cb.required = true;
                }

                if (vData.privacy_policy_url) {
                    const pl = document.getElementById('footer-privacy-link');
                    if (pl) pl.href = vData.privacy_policy_url;
                }
                if (vData.cookie_policy_url) {
                    const cl = document.getElementById('footer-cookie-link');
                    if (cl) cl.href = vData.cookie_policy_url;
                }
            })
            .catch(err => console.error("Failed to load policy links", err));
    </script>

    <div style="margin-top: 24px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.06); text-align: center; font-size: 11px; display: flex; justify-content: center; gap: 12px; align-items: center; width: 100%; max-width: 400px; margin-left: auto; margin-right: auto;">
        <a href="/privacy" id="footer-privacy-link" style="color: var(--text-muted); text-decoration: none; transition: 0.2s;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-muted)'">Privacy Policy</a>
        <span style="color: var(--text-muted); opacity: 0.5;">•</span>
        <a href="/cookies" id="footer-cookie-link" style="color: var(--text-muted); text-decoration: none; transition: 0.2s;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-muted)'">Cookie Disclosure</a>
    </div>
</body>
</html>
