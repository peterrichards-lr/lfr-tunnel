version: '3.8'

services:
  # 1. Keycloak Identity Provider
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command:
      - start-dev
      - --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_PROXY: edge
    volumes:
      - ./keycloak-realm.json:/opt/keycloak/data/import/realm.json:ro
    ports:
      - "${E2E_KEYCLOAK_PORT:-8088}:8080"  # Expose on host for test script polling
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET /realms/liferay/.well-known/openid-configuration HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  # 2. Mailpit SMTP catcher (for any server-side emails)
  mailpit:
    image: axllent/mailpit
    ports:
      - "${E2E_MAILPIT_PORT:-8025}:8025"
    expose:
      - "1025"

  # 3. Server Gateway Daemon (with SSO config)
  lfr-tunneld:
    build:
      context: ../../
      dockerfile: cmd/lfr-tunneld/Dockerfile
    command: ["--config", "/etc/lfr-tunneld/server-config.yaml"]
    volumes:
      - ./server-config-sso.yaml:/etc/lfr-tunneld/server-config.yaml:ro
    expose:
      - "8080"
      - "8081"
    depends_on:
      keycloak:
        condition: service_healthy
      mailpit:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/api/version"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # 4. Nginx Reverse Proxy (VPS Mirror)
  nginx-proxy:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${E2E_PROXY_PORT:-8000}:80"
    networks:
      default:
        aliases:
          - tunnel.lfr-demo.local
          - lfr-demo.local
    depends_on:
      lfr-tunneld:
        condition: service_healthy
