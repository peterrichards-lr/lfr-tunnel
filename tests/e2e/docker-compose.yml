version: '3.8'

services:
  # 1. Mock Liferay target instance
  mock-target:
    image: nginx:alpine
    volumes:
      - ./mock-html:/usr/share/nginx/html
    expose:
      - "80"

  # 2. Mailpit SMTP catcher
  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025" # Web UI / REST API
    expose:
      - "1025" # SMTP Port

  # 3. Server Gateway Daemon
  lfr-tunneld:
    build:
      context: ../../
      dockerfile: cmd/lfr-tunneld/Dockerfile
    command: ["--config", "/etc/lfr-tunneld/server-config.yaml"]
    volumes:
      - ./server-config.yaml:/etc/lfr-tunneld/server-config.yaml:ro
    expose:
      - "8080"
      - "8081"
    depends_on:
      - mailpit

  # 4. Nginx Reverse Proxy (VPS Mirror)
  nginx-proxy:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    networks:
      default:
        aliases:
          - tunnel.lfr-demo.local
          - lfr-demo.local
    depends_on:
      - lfr-tunneld

  # 5. Client CLI Container
  lfr-tunnel:
    build:
      context: ../../
      dockerfile: Dockerfile
    environment:
      - LFT_TARGET_HOST=mock-target
      - LFT_TARGET_PORT=80
    # Stalled entrypoint so the container is running and we can execute commands inside it
    entrypoint: ["sleep", "infinity"]
    depends_on:
      - nginx-proxy
