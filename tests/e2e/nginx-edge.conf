events {
    worker_connections 1024;
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Control Plane (EU / Central)
    server {
        listen 80;
        server_name lfr-demo.local tunnel.lfr-demo.local;

        location /api/ {
            proxy_pass http://lfr-tunneld-control:8080;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /admin {
            proxy_pass http://lfr-tunneld-control:8080;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /static/ {
            proxy_pass http://lfr-tunneld-control:8080;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /tunnel {
            proxy_pass http://lfr-tunneld-control:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
        }

        location / {
            proxy_pass http://lfr-tunneld-control:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
        }
    }

    server {
        listen 80;
        server_name *.lfr-demo.local;

        location / {
            proxy_pass http://lfr-tunneld-control:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto http;
        }
    }

    # Edge Plane (US Regional)
    server {
        listen 80;
        server_name us.lfr-demo.local;

        location / {
            return 301 http://lfr-demo.local$request_uri;
        }

        location /api/ {
            proxy_pass http://lfr-tunneld-edge:8090;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /tunnel {
            proxy_pass http://lfr-tunneld-edge:8090;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
        }
    }

    server {
        listen 80;
        server_name *.us.lfr-demo.local;

        location / {
            proxy_pass http://lfr-tunneld-edge:8090;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto http;
        }
    }
}
