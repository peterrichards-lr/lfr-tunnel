events {
    worker_connections 1024;
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name lfr-demo.se tunnel.lfr-demo.se lfr-demo.online tunnel.lfr-demo.online;

        # Redirect root control plane requests to lfr-tunneld on 8080
        location /api/ {
            proxy_pass http://lfr-tunneld:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /tunnel {
            proxy_pass http://lfr-tunneld:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
        }
    }

    server {
        listen 80;
        server_name *.lfr-demo.se *.lfr-demo.online;

        location / {
            proxy_pass http://lfr-tunneld:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto http;
        }
    }
}
