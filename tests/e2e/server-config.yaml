domains:
  - "lfr-demo.se"
  - "lfr-demo.online"
http_bind_addr: "0.0.0.0:8080"
db_path: "/etc/lfr-tunneld/lfr-tunnel.db"
smtp_server:
  host: "mailpit"
  port: 1025
  from_address: "Liferay Tunnel <noreply@lfr-demo.se>"

owner:
  user_id: "admin@lfr-demo.se"
  name: "Admin User"

admin_notification_email: "admin@lfr-demo.se"
enable_registration: true

sso_providers:
  - id: "keycloak"
    name: "Liferay Keycloak"
    client_id: "lfr-tunnel"
    client_secret: "secret"
    issuer_url: "http://keycloak:8080/realms/liferay"
    icon: "key"

# Token Expiry & Pruning Configuration
# Default values are 1h (prune), 15m (magic link), 24h (invite), 24h (verification)
prune_interval: 1m
magic_link_expiry: 1m
invite_link_expiry: 5m
verification_link_expiry: 5m
session_expiry: 5m
